name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: frontend/admin
      - run: make build-admin
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Lint and test
        env:
          CGO_ENABLED: "1"
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libglfw3-dev pkg-config libxtst-dev
          make lint
          make test

  release:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: frontend/admin
      - run: make build-admin
      - name: Build binaries
        run: |
          go build -o dist/bizshuffle-server.exe ./cmd/server
          $env:CGO_ENABLED=1; go build -o dist/bizshuffle-desktop.exe ./cmd/desktop
      - name: Package server zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item dist/bizshuffle-server.exe dist/package/
          Copy-Item -Recurse serverhost/static dist/package/web
          Copy-Item -Recurse assets/plugins dist/package/plugins -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/package/* -DestinationPath dist/bizshuffle-server-windows.zip -Force
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bizshuffle-server.exe
            dist/bizshuffle-desktop.exe
            dist/bizshuffle-server-windows.zip
