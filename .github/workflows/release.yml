name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.work.sum

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3"

      - name: Install admin deps
        run: bun install --frozen-lockfile
        working-directory: frontend/admin

      - name: Build admin UI
        run: make build-admin

      - name: Sync workspace
        run: go work sync

      - name: Install CGO deps (desktop / clienthost tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libglfw3-dev pkg-config libxtst-dev

      - name: Install dev tools
        run: make tools-install

      - name: Lint
        env:
          CGO_ENABLED: "1"
        run: make lint

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: make test

  release:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.work.sum

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3"

      - name: Install admin deps
        run: bun install --frozen-lockfile
        working-directory: frontend/admin

      - name: Build admin UI
        run: make build-admin

      - name: Sync workspace
        run: go work sync

      - name: Build binaries
        run: |
          go build -o dist/bizshuffle-server.exe ./cmd/server
          $env:CGO_ENABLED=1; go build -o dist/bizshuffle-desktop.exe ./cmd/desktop

      - name: Package server zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item dist/bizshuffle-server.exe dist/package/
          Copy-Item -Recurse serverhost/static dist/package/web
          Copy-Item -Recurse assets/plugins dist/package/plugins -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/package/* -DestinationPath dist/bizshuffle-server-windows.zip -Force

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/bizshuffle-server.exe
            dist/bizshuffle-desktop.exe
            dist/bizshuffle-server-windows.zip
